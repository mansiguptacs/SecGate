---
# SecGate Phase 3 — smallest happy-path deploy (CPU-only hello world).
# Used by BACKEND=akash for staging-api / nginx demos. NOT for GPU paths.
version: "2.0"

services:
  web:
    image: nginx:alpine
    expose:
      - port: 80
        as: 80
        to:
          - global: true
    env:
      - SECGATE_SERVICE=staging-api

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 128Mi
        storage:
          - size: 128Mi
  placement:
    dcloud:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - akash1365yvmc4s7awfe7yrg79duy617dy85xfxakjss
      pricing:
        web:
          denom: uact
          amount: 10000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
